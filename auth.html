<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | SoftRent</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page-body">
    <div id="gradient"></div>
    <canvas id="paper"></canvas>

    <!-- Header (simplified for Auth page) -->
    <header class="site-header auth-header">
      <div class="header-left-capsule">
        <button class="btn-menu" id="btn-menu" aria-label="Open menu">☰</button>
        <div class="header-brand">
          <a href="index.html" class="brand-link">
            <img src="assets/images/softrent_logo_transparent.png" alt="SoftRent Logo" class="brand-img">
          </a>
        </div>
      </div>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <!-- Left Branding Side -->
            <div class="auth-branding">
                <div class="auth-branding-content reveal">
                    <h1>Automate.<br>Manage.<br>Grow.</h1>
                    <p>Join SoftRent to streamline your workflows, eliminate repetitive tasks, and scale your business effortlessly.</p>
                </div>
            </div>

            <!-- Right Form Side -->
            <div class="auth-form-wrapper reveal" style="animation-delay: 0.1s;">
                <div class="auth-glass-panel">
                    
                    <!-- Form Tabs -->
                    <div class="auth-tabs">
                        <button class="auth-tab active" id="tab-login">Log In</button>
                        <button class="auth-tab" id="tab-register">Sign Up</button>
                    </div>

                    <!-- Login Form -->
                    <form id="form-login" class="auth-form active">
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" placeholder="you@business.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                    </form>

                    <!-- Register Form -->
                    <form id="form-register" class="auth-form">
                        <div class="form-group">
                            <label for="reg-name">Full Name</label>
                            <input type="text" id="reg-name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Work Email</label>
                            <input type="email" id="reg-email" placeholder="you@business.com" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Create Password</label>
                            <input type="password" id="reg-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                        <p class="auth-terms">By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js" defer></script>
    <script src="js/background.js" defer></script>
    
    <!-- Auth Page specific logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tabLogin = document.getElementById("tab-login");
            const tabRegister = document.getElementById("tab-register");
            const formLogin = document.getElementById("form-login");
            const formRegister = document.getElementById("form-register");

            function switchTab(tab) {
                if (tab === 'login') {
                    tabLogin.classList.add('active');
                    tabRegister.classList.remove('active');
                    formLogin.classList.add('active');
                    formRegister.classList.remove('active');
                } else {
                    tabRegister.classList.add('active');
                    tabLogin.classList.remove('active');
                    formRegister.classList.add('active');
                    formLogin.classList.remove('active');
                }
            }

            tabLogin.addEventListener("click", () => switchTab('login'));
            tabRegister.addEventListener("click", () => switchTab('register'));
            
            // Prevent actual form submission for demo purposes
            formLogin.addEventListener("submit", (e) => {
                e.preventDefault();
                alert("Login successful! Redirecting to dashboard...");
                window.location.href = "index.html";
            });
            
            formRegister.addEventListener("submit", (e) => {
                e.preventDefault();
                alert("Account created! Redirecting to dashboard...");
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
